<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GimmoBot Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b1f3b, #0b0f1a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #eaeaf0;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(20, 24, 48, 0.95);
      padding: 28px 24px 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .logo {
      width: 160px;
      display: block;
      margin: 0 auto 14px;
      border-radius: 50%;
    }

    h1 {
      text-align: center;
      margin: 0;
      font-size: 22px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #9aa3ff;
      margin-bottom: 22px;
    }

    label {
      font-size: 13px;
      color: #cfd3ff;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(10,12,28,0.9);
      color: #fff;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6a7cff, #38e8ff);
      font-weight: 700;
      cursor: pointer;
    }

    .links {
      margin-top: 18px;
      text-align: center;
    }

    .links a {
      color: #38e8ff;
      text-decoration: none;
      font-size: 13px;
    }

    footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #6f74b8;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="./logo.png" class="logo" alt="GimmoBot">

    <h1>GimmoBot Setup</h1>
    <div class="subtitle">Smart Desktop Robot Configuration</div>

    <form>
      <label>Wi-Fi SSID</label>
      <input type="text" required>

      <label>Wi-Fi Password</label>
      <input type="password" required>

      <label>Weather API Key</label>
      <input type="text" required>

      <label>City</label>
      <input type="text" required>

      <button type="submit">Save Configuration</button>
    </form>

    <div class="links">
      <a href="about.html">About Us →</a>
    </div>

    <footer>
      © GimmoBot • IoT Configuration Portal
    </footer>
  </div>
</body>
</html>
