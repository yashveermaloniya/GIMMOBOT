<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About GimmoBot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f1330, #05070f);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #eaeaf0;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(20, 24, 48, 0.95);
      padding: 28px 24px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    .logo {
      width: 140px;
      margin-bottom: 16px;
      border-radius: 50%;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 13px;
      color: #cfd3ff;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .socials a {
      text-decoration: none;
    }

    .socials img {
      width: 34px;
      transition: transform 0.2s;
    }

    .socials img:hover {
      transform: scale(1.15);
    }

    .back {
      display: inline-block;
      font-size: 13px;
      color: #38e8ff;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="./logo.png" class="logo" alt="GimmoBot">

    <h1>About GimmoBot 🤖</h1>

    <p>
      GimmoBot is a smart desktop companion robot that combines emotions,
      real-time weather updates, and IoT technology.
      Built using ESP32, it brings personality and intelligence to your workspace.
    </p>
